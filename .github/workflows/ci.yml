name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ===========================================================================
  # Читаем версию из class-plugin.php
  # Все остальные джобы используют её через needs
  # ===========================================================================
  version:
    name: Read version
    runs-on: ubuntu-latest
    outputs:
      current: ${{ steps.read.outputs.current }}
      previous: ${{ steps.read.outputs.previous }}
      changed: ${{ steps.read.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # нужно чтобы сравнить с предыдущим коммитом

      - name: Read version from class-plugin.php
        id: read
        run: |
          # Читаем текущую версию
          CURRENT=$(grep -oP "const VERSION = '\K[^']+" woodev/class-plugin.php)
          echo "current=${CURRENT}" >> $GITHUB_OUTPUT
          echo "Current version: ${CURRENT}"

          # Читаем версию из предыдущего коммита
          PREVIOUS=$(git show HEAD~1:woodev/class-plugin.php 2>/dev/null \
            | grep -oP "const VERSION = '\K[^']+" || echo "")
          echo "previous=${PREVIOUS}" >> $GITHUB_OUTPUT
          echo "Previous version: ${PREVIOUS}"

          # Изменилась ли версия?
          if [ "$CURRENT" != "$PREVIOUS" ] && [ -n "$PREVIOUS" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version changed: ${PREVIOUS} → ${CURRENT}"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged"
          fi

  # ===========================================================================
  # Линтинг и статический анализ
  # ===========================================================================
  lint:
    name: Lint (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    needs: version

    strategy:
      fail-fast: true
      matrix:
        php: [ '7.4', '8.0', '8.1', '8.2' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPCS
        run: composer phpcs

      - name: Run PHPStan
        run: composer phpstan

  # ===========================================================================
  # Юнит тесты
  # ===========================================================================
  unit-tests:
    name: Unit Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        php: [ '7.4', '8.0', '8.1', '8.2' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run unit tests
        run: composer test:unit

  # ===========================================================================
  # Интеграционные тесты
  # ===========================================================================
  integration-tests:
    name: Integration Tests (WP ${{ matrix.wp }} / WC ${{ matrix.wc }})
    runs-on: ubuntu-latest
    needs: unit-tests

    strategy:
      fail-fast: false
      matrix:
        include:
          - wp: '5.9'
            wc: '5.6.0'
            php: '7.4'
          - wp: 'latest'
            wc: 'latest-stable'
            php: '8.1'
          - wp: 'latest'
            wc: 'latest-stable'
            php: '8.2'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Install Node dependencies
        run: npm ci

      - name: Configure wp-env for matrix versions
        run: |
          if [ "${{ matrix.wp }}" != "latest" ]; then
            node -e "
              const fs = require('fs');
              const env = JSON.parse(fs.readFileSync('.wp-env.json', 'utf8'));
              env.core = 'WordPress/WordPress#${{ matrix.wp }}';
              fs.writeFileSync('.wp-env.json', JSON.stringify(env, null, 2));
            "
          fi
          if [ "${{ matrix.wc }}" != "latest-stable" ]; then
            node -e "
              const fs = require('fs');
              const env = JSON.parse(fs.readFileSync('.wp-env.json', 'utf8'));
              env.plugins = env.plugins.map(p =>
                p.includes('woocommerce')
                  ? 'https://downloads.wordpress.org/plugin/woocommerce.${{ matrix.wc }}.zip'
                  : p
              );
              fs.writeFileSync('.wp-env.json', JSON.stringify(env, null, 2));
            "
          fi

      - name: Start wp-env
        run: npx wp-env start
        timeout-minutes: 10

      - name: Run integration tests
        run: composer test:integration
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib

      - name: Stop wp-env
        if: always()
        run: npx wp-env stop

  # ===========================================================================
  # Публикуем релиз — только если:
  # • пуш в main (не PR)
  # • версия изменилась
  # • все тесты прошли
  # ===========================================================================
  release:
    name: Publish Release v${{ needs.version.outputs.current }}
    runs-on: ubuntu-latest
    needs: [ version, integration-tests ]
    permissions:
      contents: write

    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.version.outputs.changed == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer:v2

      - name: Install git-cliff
        run: |
          curl -sSfL \
            https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz --strip-components=1 -C /usr/local/bin \
              git-cliff-x86_64-unknown-linux-gnu/git-cliff

      - name: Install Composer dependencies (production only)
        run: composer install --prefer-dist --no-progress --no-interaction --no-dev --optimize-autoloader

      - name: Create and push tag
        run: |
          TAG="v${{ needs.version.outputs.current }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release ${TAG}"
          git push origin "$TAG"

      - name: Generate release notes
        run: |
          git cliff --current --strip header > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Update CHANGELOG.md
        run: |
          git cliff --output CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: update CHANGELOG.md for v${{ needs.version.outputs.current }}" || echo "No changes"
          git push origin main

      - name: Build release ZIP
        id: zip
        run: |
          VERSION="${{ needs.version.outputs.current }}"
          ZIP_NAME="woodev-plugin-framework-${VERSION}.zip"

          mkdir -p /tmp/release/woodev-plugin-framework

          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='tests' \
            --exclude='node_modules' \
            --exclude='vendor/bin' \
            --exclude='*.xml' \
            --exclude='*.neon' \
            --exclude='.wp-env.json' \
            --exclude='.gitattributes' \
            --exclude='.gitignore' \
            --exclude='RELEASE_NOTES.md' \
            --exclude='composer.lock' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='cliff.toml' \
            --exclude='release.sh' \
            ./ /tmp/release/woodev-plugin-framework/

          cd /tmp/release
          zip -r "$ZIP_NAME" woodev-plugin-framework/

          echo "zip_path=/tmp/release/${ZIP_NAME}" >> $GITHUB_OUTPUT
          echo "zip_name=${ZIP_NAME}" >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.current }}
          name: "Woodev Plugin Framework ${{ needs.version.outputs.current }}"
          body_path: RELEASE_NOTES.md
          files: ${{ steps.zip.outputs.zip_path }}
          draft: false
          prerelease: ${{ contains(needs.version.outputs.current, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}