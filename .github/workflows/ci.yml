name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ===========================================================================
  # Читаем версию из class-plugin.php
  # ===========================================================================
  version:
    name: Read version
    runs-on: ubuntu-latest
    outputs:
      current: ${{ steps.read.outputs.current }}
      previous: ${{ steps.read.outputs.previous }}
      changed: ${{ steps.read.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Read version from class-plugin.php
        id: read
        run: |
          CURRENT=$(grep -oP "const VERSION = '\K[^']+" woodev/class-plugin.php)
          echo "current=${CURRENT}" >> $GITHUB_OUTPUT

          PREVIOUS=$(git show HEAD~1:woodev/class-plugin.php 2>/dev/null \
            | grep -oP "const VERSION = '\K[^']+" || echo "")
          echo "previous=${PREVIOUS}" >> $GITHUB_OUTPUT

          if [ "$CURRENT" != "$PREVIOUS" ] && [ -n "$PREVIOUS" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version changed: ${PREVIOUS} → ${CURRENT}"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged: ${CURRENT}"
          fi

  # ===========================================================================
  # PHPCS (все поддерживаемые версии) + PHPStan (целевая версия)
  # ===========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: version

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-8.1-${{ hashFiles('composer.json') }}
          restore-keys: composer-8.1-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Security audit
        run: composer audit --no-dev

      - name: Run PHPCS
        run: ./vendor/bin/phpcs --warning-severity=0

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --memory-limit=2G

  # ===========================================================================
  # PHP Compatibility check (7.4 → 8.2)
  # ===========================================================================
  compat:
    name: PHP Compat (${{ matrix.php }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.2', '8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Check PHP syntax
        run: find woodev -name '*.php' -print0 | xargs -0 php -l | grep -v "^No syntax errors" || true

  # ===========================================================================
  # Юнит-тесты (PHP 7.4 – 8.2)
  # ===========================================================================
  unit-tests:
    name: Unit Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run unit tests
        run: composer test:unit

  # ===========================================================================
  # Публикуем релиз — только если:
  # • пуш в main (не PR)
  # • версия изменилась
  # • lint и unit-tests прошли
  # ===========================================================================
  release:
    name: Publish Release v${{ needs.version.outputs.current }}
    runs-on: ubuntu-latest
    needs: [version, lint, unit-tests]
    permissions:
      contents: write

    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.version.outputs.changed == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer:v2

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Install Composer dependencies (production only)
        run: composer install --prefer-dist --no-progress --no-interaction --no-dev --optimize-autoloader

      - name: Create and push tag
        run: |
          TAG="v${{ needs.version.outputs.current }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release ${TAG}"
          git push origin "$TAG"

      - name: Generate release notes
        run: git cliff --current --output RELEASE_NOTES.md

      - name: Update CHANGELOG.md
        run: |
          git cliff --output CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: update CHANGELOG.md for v${{ needs.version.outputs.current }}"
          git push origin main

      - name: Build release ZIP
        id: zip
        run: |
          VERSION="${{ needs.version.outputs.current }}"
          ZIP_NAME="woodev-plugin-framework-${VERSION}.zip"
          mkdir -p /tmp/release/woodev-plugin-framework

          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.ai' \
            --exclude='tests' \
            --exclude='node_modules' \
            --exclude='vendor/bin' \
            --exclude='*.xml' \
            --exclude='*.neon' \
            --exclude='*.toml' \
            --exclude='.wp-env*.json' \
            --exclude='.gitattributes' \
            --exclude='.gitignore' \
            --exclude='RELEASE_NOTES.md' \
            --exclude='composer.lock' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            ./ /tmp/release/woodev-plugin-framework/

          cd /tmp/release && zip -r "$ZIP_NAME" woodev-plugin-framework/
          echo "zip_path=/tmp/release/${ZIP_NAME}" >> $GITHUB_OUTPUT
          echo "zip_name=${ZIP_NAME}" >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.current }}
          name: "Woodev Plugin Framework ${{ needs.version.outputs.current }}"
          body_path: RELEASE_NOTES.md
          files: ${{ steps.zip.outputs.zip_path }}
          draft: false
          prerelease: ${{ contains(needs.version.outputs.current, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
