name: Integration Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ===========================================================================
  # Интеграционные тесты — матрица WP × WC × PHP
  # Каждая комбинация запускается в изолированном wp-env (Docker)
  # ===========================================================================
  integration:
    name: WP ${{ matrix.wp }} / WC ${{ matrix.wc }} / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    env:
      WP_ENV_HOME: /tmp/wp-env

    strategy:
      fail-fast: false
      matrix:
        include:
          # Oldest actively-maintained pair (many shared hosting setups)
          - wp: '6.4'
            wc: '8.5.1'
            php: '8.1'

          # Mid-cycle 2024 — common in production environments
          - wp: '6.6'
            wc: '9.3.0'
            php: '8.2'

          # Current latest — always tracks the bleeding edge
          - wp: 'latest'
            wc: 'latest-stable'
            php: '8.2'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Install wp-env
        run: npm install -g @wordpress/env

      - name: Configure wp-env versions
        run: |
          python3 - <<'PYEOF'
          import json

          wp  = "${{ matrix.wp }}"
          wc  = "${{ matrix.wc }}"
          php = "${{ matrix.php }}"

          override = {
              "core": None if wp == "latest"
                      else f"https://wordpress.org/wordpress-{wp}.zip",
              "phpVersion": php,
              "plugins": [
                  "https://downloads.wordpress.org/plugin/woocommerce.latest-stable.zip"
                  if wc == "latest-stable"
                  else f"https://downloads.wordpress.org/plugin/woocommerce.{wc}.zip"
              ],
          }
          payload = json.dumps(override, indent=2)
          print(payload)
          with open(".wp-env.override.json", "w") as f:
              f.write(payload + "\n")
          PYEOF

      - name: Start wp-env
        run: npx wp-env start

      - name: Wait for wp-env to be ready
        run: |
          echo "Waiting for WordPress to be ready..."
          for i in $(seq 1 30); do
            if npx wp-env run tests-cli wp core is-installed 2>/dev/null; then
              echo "WordPress is ready."
              break
            fi
            echo "Attempt $i/30, retrying in 5s..."
            sleep 5
          done

      - name: Show WP and WC versions
        run: |
          npx wp-env run tests-cli wp core version
          npx wp-env run tests-cli wp plugin list

      - name: Run integration tests
        run: |
          npx wp-env run tests-cli \
            env TEST_SUITE=integration \
            php /var/www/html/woodev-framework/vendor/bin/phpunit \
              --configuration /var/www/html/woodev-framework/phpunit.xml \
              --testsuite=Integration \
              --no-coverage

      - name: Stop wp-env
        if: always()
        run: npx wp-env stop
