name: PR Triage

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

jobs:
  label-pr:
    name: Label PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Label based on changed files
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

      - name: Add 'needs-review' label
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --add-label "status: needs review"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on first-time contributor
        if: github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "👋 Thanks for your first contribution! A maintainer will review your PR soon."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
