name: Markdown Lint

on:
  pull_request:
    paths:
      - '**.md'
  push:
    branches:
      - main
    paths:
      - '**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Lint markdown files
        # Gate the PUBLISHED docs/ tree (GH Pages) + root markdown. Excludes: vendored/AI-tool
        # files (.ai, CLAUDE.md, QWEN.md, AGENTS.md — agent-instruction/constitution docs), the
        # AI-agent operational docs (docs-internal/, not published), the autodev loop blackboard
        # (.autodev/, machine-generated queue/escalations/digest) and Serena tooling (.serena/).
        run: markdownlint-cli2 "**/*.md" "#node_modules" "#vendor" "#.ai" "#.kiro" "#CLAUDE.md" "#QWEN.md" "#AGENTS.md" "#docs-internal" "#.autodev" "#.serena" "#CHANGELOG.md"
