name: Bug Report
description: Report a bug in the Woodev plugin
labels: ["type: bug", "status: awaiting triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill out the form below with as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: |
        Steps to reproduce the behavior:
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recordings
      description: If applicable, add screenshots or screen recordings to help explain your problem.
      placeholder: "You can drag and drop images here to upload"
    validations:
      required: false

  - type: input
    id: wordpress-version
    attributes:
      label: WordPress version
      placeholder: "e.g., 6.4.2"
    validations:
      required: true

  - type: input
    id: woocommerce-version
    attributes:
      label: WooCommerce version
      placeholder: "e.g., 8.5.1"
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "e.g., 8.1"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: |
        Please provide details about your environment:
        - Active plugins
        - Theme
        - Server environment (if relevant)
      placeholder: |
        - Plugin A 1.0.0
        - Plugin B 2.0.0
        - Theme: Storefront 4.0.0
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Error logs
      description: If you have error logs, please paste them here.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://example.com) (add your own if needed).
      options:
        - label: I agree to follow the Code of Conduct
          required: true
